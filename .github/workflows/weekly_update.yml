name: Weekly NFL Prediction Update

on:
  schedule:
    - cron: '0 10 * * 2'   # Every Tuesday 10:00 UTC (6am ET)
  workflow_dispatch:
    inputs:
      force_data:
        description: 'Force re-download all data'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data/raw data/processed data/predictions/archive model/saved docs/assets

      # Save this run's freshly trained artifacts to the Actions cache so the
      # Thursday predict-only job can restore them instead of retraining.
      # (Artifacts are gitignored — committing them would bloat the repo.)
      - name: Cache model artifacts
        uses: actions/cache@v4
        with:
          path: model/saved
          key: model-saved-${{ github.run_id }}
          restore-keys: |
            model-saved-

      - name: Run weekly pipeline
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_data }}" = "true" ] && FORCE="--force-data"
          python model/pipeline.py --mode full $FORCE
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      # NOTE: the old version also ran `git add model/saved/*.pkl` etc. —
      # those paths are gitignored, so every one of those adds silently
      # failed behind `|| true`. Only genuinely committable files are listed.
      - name: Commit updated predictions
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git add docs/assets/
          git add data/predictions/predictions_latest.json data/predictions/performance.json || true
          git add model/saved/optimal_weights.json model/saved/version.txt || true
          git diff --staged --quiet || git commit -m "Weekly update — $(date -u '+%Y-%m-%d')"
          git push

      - name: Upload pipeline log on failure
        if: failure()
        uses: act