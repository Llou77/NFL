name: Weekly NFL Prediction Update

on:
  schedule:
    # Every Tuesday at 10:00 UTC (6:00 AM ET) — after Monday Night Football results are in
    - cron: '0 10 * * 2'
  workflow_dispatch:
    inputs:
      force_data:
        description: 'Force re-download all data'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly pipeline
        run: |
          cd model
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_data }}" = "true" ]; then
            FORCE_FLAG="--force-data"
          fi
          python pipeline.py --mode full $FORCE_FLAG
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Commit updated predictions and performance
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "bot@nfl-predictor.local"
          git add data/predictions/ model/saved/ data/processed/
          git diff --cached --quiet || git commit -m "chore: weekly update $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: data/predictions/run_log_full.json
          retention-days: 7
