name: Weekly NFL Prediction Update

on:
  schedule:
    - cron: '0 10 * * 2'   # Every Tuesday 10:00 UTC (6am ET)
  workflow_dispatch:
    inputs:
      force_data:
        description: 'Force re-download all data'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data/raw data/processed data/predictions/archive model/saved docs/assets

      - name: Run weekly pipeline
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_data }}" = "true" ] && FORCE="--force-data"
          python model/pipeline.py --mode full $FORCE
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Commit updated predictions
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git add docs/assets/predictions_latest.json || true
          git add docs/assets/performance.json || true
          git add data/predictions/predictions_latest.json || true
          git add data/predictions/performance.json || true
          git add model/saved/calibration.json || true
          git add model/saved/feature_list.json || true
          git add model/saved/version.txt || true
          git add model/saved/training_log.json || true
          git add model/saved/nn_config.json || true
          git add model/saved/*.pkl || true
          git add model/saved/*.json || true
          git add model/saved/*.pt || true
          git add model/saved/lgbm_home.txt model/saved/lgbm_away.txt || true
          git diff --staged --quiet || git commit -m "Weekly update — $(date -u '+%Y-%m-%d')"
          git push

      - name: Upload pipeline log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_number }}
          path: data/pipeline.log
          retention-days: 14
