# Builds the committed data/frozen/ layer: all data for CLOSED seasons,
# downloaded once and stored in the repo, so normal pipeline runs need zero
# network access for historical data (see scripts/freeze_data.py).
#
# Run it: once now, then once a year after the Super Bowl (cron below), or
# whenever you want to re-seal:  date > .freeze-trigger && git add ... && push
name: Freeze Historical Data

on:
  push:
    branches: [main]
    paths: ['.freeze-trigger']
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-download and overwrite existing frozen files'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: '0 6 1 4 *'   # April 1st, yearly — seals the season that just ended

permissions:
  contents: write

concurrency:
  group: nfl-pipeline
  cancel-in-progress: false

jobs:
  freeze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # freeze only needs the data stack, not torch — keep it light
      - name: Install dependencies
        run: pip install pandas==2.2.2 numpy==1.26.4 pyarrow==16.1.0

      - name: Build frozen layer
        run: |
          set -o pipefail
          FORCE=""
          [ "${{ github.event.inputs.force }}" = "true" ] && FORCE="--force"
          python -u scripts/freeze_data.py $FORCE 2>&1 | tee -a run_console.log

      - name: Commit frozen data
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git add data/frozen/
          git diff --staged --quiet || git commit -m "Freeze historical data — $(date -u '+%Y-%m-%d')"
          for i in 1 2 3; do git push && break || git pull --rebase origin main; done

      - name: Publish run log
        if: always()
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          mkdir -p data/logs
          {
            echo "=== freeze $(date -u '+%Y-%m-%dT%H:%MZ') — status: ${{ job.status }} ==="
            echo "--- console (tail) ---"
            tail -c 40000 run_console.log 2>/dev/null || echo "(no console log)"
          } > data/logs/freeze_last.txt
          git add data/logs/freeze_last.txt
          git commit -m "Freeze run log" || true
          for i in 1 2 3; do git push && break || git pull --rebase origin main; done
