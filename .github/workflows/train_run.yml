# Standalone Stage 2: train the ensemble + generate predictions (~8-12 min).
# Uses the last committed optimal_weights.json (run Optimize first if you
# want fresh weights).
# Trigger:  date > .train-trigger && git add .train-trigger && git commit && git push
name: Train + Predict (standalone)

on:
  push:
    branches: [main]
    paths: ['.train-trigger']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nfl-pipeline
  cancel-in-progress: false

jobs:
  train_predict:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (CPU-only torch)
        run: |
          pip install torch==2.3.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data/raw data/processed data/predictions/archive model/saved docs/assets data/logs

      - name: Cache model artifacts
        uses: actions/cache@v4
        with:
          path: model/saved
          key: model-saved-v2-${{ github.run_id }}
          restore-keys: |
            model-saved-v2-

      - name: Train + predict
        run: |
          set -o pipefail
          python -u model/pipeline.py --mode full 2>&1 | tee -a run_console.log
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Commit predictions
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git add docs/assets/
          git add data/predictions/predictions_latest.json data/predictions/performance.json || true
          git add model/saved/optimal_weights.json model/saved/version.txt || true
          git diff --staged --quiet || git commit -m "Train/predict — $(date -u '+%Y-%m-%d %H:%M')"
          for i in 1 2 3; do git push && break || git pull --rebase origin main; done

      - name: Publish run log
        if: always()
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          mkdir -p data/logs
          {
            echo "=== train(standalone) $(date -u '+%Y-%m-%dT%H:%MZ') — status: ${{ job.status }} ==="
            echo "--- console (tail) ---"
            tail -c 40000 run_console.log 2>/dev/null || echo "(no console log)"
          } > data/logs/train_last.txt
          git add data/logs/train_last.txt
          git commit -m "Train run log" || true
          for i in 1 2 3; do git push && break || git pull --rebase origin main; done
