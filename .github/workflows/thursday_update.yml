name: Thursday Night Game Update

on:
  schedule:
    - cron: '0 22 * * 3'   # Every Wednesday 22:00 UTC (6pm ET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  thursday-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data/raw data/processed data/predictions/archive model/saved docs/assets

      - name: Refresh predictions (predict-only, no retrain)
        run: python model/pipeline.py --mode predict_only
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Commit updated predictions
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git add docs/assets/predictions_latest.json || true
          git add data/predictions/predictions_latest.json || true
          git diff --staged --quiet || git commit -m "TNF refresh — $(date -u '+%Y-%m-%d')"
          git push
