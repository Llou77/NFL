name: Thursday Night Game Update

on:
  schedule:
    - cron: '0 22 * * 3'   # Every Wednesday 22:00 UTC (6pm ET)
  workflow_dispatch:
    inputs:
      skip_guard:
        description: 'Run even in the offseason (bypass guard)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

concurrency:
  group: nfl-pipeline
  cancel-in-progress: false

jobs:
  thursday-update:
    runs-on: ubuntu-latest
    # If the artifact cache misses, predict_only falls back to a full
    # training run — hence more than a predict-only job would need.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Offseason guard
        id: guard
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.skip_guard }}" = "true" ]; then
            ARGS="--force"
          fi
          DECISION=$(python3 scripts/season_guard.py $ARGS)
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
          echo "Guard decision: $DECISION"

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.decision == 'run'
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (CPU-only torch)
        if: steps.guard.outputs.decision == 'run'
        run: |
          pip install torch==2.3.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Create directories
        if: steps.guard.outputs.decision == 'run'
        run: mkdir -p data/raw data/processed data/predictions/archive model/saved docs/assets data/logs

      # Model artifacts are gitignored — restore the most recent trained set
      # from the Actions cache (saved by the weekly run). On a cache miss the
      # pipeline falls back to training instead of crashing.
      - name: Restore model artifacts
        if: steps.guard.outputs.decision == 'run'
        uses: actions/cache@v4
        with:
          path: model/saved
          key: model-saved-v2-${{ github.run_id }}
          restore-keys: |
            model-saved-v2-

      - name: Refresh predictions (predict-only, trains on cache miss)
        if: steps.guard.outputs.decision == 'run'
        run: |
          set -o pipefail
          python -u model/pipeline.py --mode predict_only 2>&1 | tee -a run_console.log
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Commit updated predictions
        if: steps.guard.outputs.decision == 'run'
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git add docs/assets/
          # ONE pathspec per add: `git add A B || true` fails ENTIRELY when
          # B does not exist, silently un-staging A too.
          git add data/predictions/predictions_latest.json || true
          git add data/predictions/performance.json || true
          git diff --staged --quiet || git commit -m "TNF refresh — $(date -u '+%Y-%m-%d')"
          for i in 1 2 3; do git push && break || git pull --rebase origin main; done

      - name: Publish run log
        if: always() && steps.guard.outputs.decision == 'run'
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          mkdir -p data/logs
          {
            echo "=== thursday $(date -u '+%Y-%m-%dT%H:%MZ') — status: ${{ job.status }} ==="
            echo "--- console (tail) ---"
            tail -c 40000 run_console.log 2>/dev/null || echo "(no console log)"
          } > data/logs/thursday_last.txt
          git add data/logs/thursday_last.txt
          git commit -m "Thursday run log" || true
          for i in 1 2 3; do git push && break || git pull --rebase origin main; done
