name: Thursday Night Game Update

on:
  schedule:
    - cron: '0 22 * * 3'   # Every Wednesday 22:00 UTC (6pm ET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  thursday-update:
    runs-on: ubuntu-latest
    # Raised from 30: if the artifact cache misses, predict_only falls back
    # to a full training run (see pipeline.run_predict_only).
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data/raw data/processed data/predictions/archive model/saved docs/assets

      # Model artifacts are gitignored (too large to commit), so a clean
      # checkout has none — this used to crash predict_only with
      # FileNotFoundError every single week. Restore the most recent trained
      # set from the Actions cache (saved by the weekly training run). On a
      # cache miss the pipeline now falls back to training — slower, but it
      # never crashes.
      - name: Restore model artifacts
        uses: actions/cache@v4
        with:
          path: model/saved
          key: model-saved-${{ github.run_id }}
          restore-keys: |
            model-saved-

      - name: Refresh predictions (predict-only, trains on cache miss)
        run: python model/pipeline.py --mode predict_only
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Commit updated predictions
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git add docs/assets/
          git add data/predictions/predictions_latest.json data/predictions/performance.json || true
          git diff --staged --quiet || git commit -m "TNF refresh — $(date -u '+%Y-%m-%d')"
          git push
