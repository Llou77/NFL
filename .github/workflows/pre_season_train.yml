# Pre-season kickoff: on the first Tuesday of August it dispatches the
# STAGED full pipeline (optimize → train+predict → backtest matrix) instead
# of duplicating those steps here in one monolithic job.
# Note: workflow_dispatch fired with GITHUB_TOKEN is one of the documented
# exceptions to GitHub's "GITHUB_TOKEN events don't trigger workflows" rule,
# so this chain works without a personal access token.
name: Pre-Season Kickoff

on:
  schedule:
    # CRON FIX kept from the previous version: '0 12 1-7 8 2' fired ~11×
    # (day-of-month and day-of-week are OR-ed). Every August Tuesday +
    # first-Tuesday guard = exactly one run per year.
    - cron: '0 12 * 8 2'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  kickoff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: First-Tuesday guard (scheduled runs only)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%d)" -gt 07 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not the first Tuesday of August — skipping."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Kick off the staged full pipeline
        if: steps.guard.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run full_pipeline.yml -R ${{ github.repository }}
