name: Pre-Season Training

on:
  schedule:
    - cron: '0 12 1-7 8 2'   # First Tuesday of August
  workflow_dispatch:
    inputs:
      run_backtest:
        description: 'Run backtest suite after training'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  preseason-train:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data/raw data/processed data/predictions/archive model/saved docs/assets

      - name: Step 1 — Bayesian optimisation
        run: python model/pipeline.py --mode optimize --force-data
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Step 2 — Full train + predict
        run: python model/pipeline.py --mode full
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Step 3 — Backtesting
        if: ${{ github.event.inputs.run_backtest != 'false' }}
        run: python model/pipeline.py --mode backtest
        env:
          PYTHONPATH: ${{ github.workspace }}/model
        continue-on-error: true   # don't fail the whole job if backtest fails

      - name: Commit artifacts
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git add docs/assets/ || true
          git add model/saved/optimal_weights.json || true
          git add data/predictions/predictions_latest.json || true
          git add data/predictions/performance.json || true
          git add data/predictions/backtest_results.json || true
          git diff --staged --quiet || git commit -m "Pre-season training — $(date -u '+%Y-%m-%d')"
          git push
