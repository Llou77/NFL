name: Pre-Season Training

on:
  schedule:
    # First Tuesday of August at 12:00 UTC
    - cron: '0 12 1-7 8 2'
  workflow_dispatch:
    inputs:
      run_backtest:
        description: 'Run backtest suite after training'
        required: false
        default: 'true'
        type: boolean

jobs:
  preseason-train:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/processed data/predictions/archive model/saved

      - name: Step 1 — Bayesian weight optimisation
        run: |
          cd model
          python pipeline.py --mode optimize
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Step 2 — Full training + predictions
        run: |
          cd model
          python pipeline.py --mode full
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Step 3 — Backtesting (optional)
        if: ${{ github.event.inputs.run_backtest != 'false' }}
        run: |
          cd model
          python pipeline.py --mode backtest
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Copy predictions to docs
        run: |
          cp data/predictions/predictions_latest.json docs/assets/predictions_latest.json || true
          cp data/predictions/performance.json docs/assets/performance.json || true
          cp data/predictions/backtest_results.json docs/assets/backtest_results.json || true

      - name: Commit all artifacts
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git add docs/assets/
          git add data/predictions/ || true
          git add model/saved/optimal_weights.json || true
          git diff --staged --quiet || git commit -m "Pre-season training complete — $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
