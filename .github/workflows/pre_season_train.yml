name: Pre-Season Training

on:
  schedule:
    # First Tuesday of August at 12:00 UTC
    - cron: '0 12 1-7 8 2'
  workflow_dispatch:
    inputs:
      run_backtest:
        description: 'Run backtest suite after training'
        required: false
        default: 'true'
        type: boolean

jobs:
  preseason-train:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run pre-season pipeline (Bayesian opt + full train)
        run: |
          cd model
          python pipeline.py --mode preseason --force-data
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Run backtest suite
        if: ${{ github.event.inputs.run_backtest != 'false' }}
        run: |
          cd model
          python pipeline.py --mode backtest
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Commit all artifacts
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "bot@nfl-predictor.local"
          git add data/ model/saved/
          git diff --cached --quiet || git commit -m "feat: pre-season training $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
