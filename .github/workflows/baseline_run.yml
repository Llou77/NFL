name: Baseline Run (push-triggered)

# Full honest pipeline: optimize → train+predict → backtest.
# Triggered by ANY change to the .baseline-trigger file (so it can be started
# with a plain git push — no Actions UI or API token needed), or manually.
on:
  push:
    branches: [main]
    paths: ['.baseline-trigger']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # backtest retrains the ensemble up to 5x — give it room

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data/raw data/processed data/predictions/archive model/saved docs/assets

      - name: Cache model artifacts
        uses: actions/cache@v4
        with:
          path: model/saved
          key: model-saved-${{ github.run_id }}
          restore-keys: |
            model-saved-

      - name: Step 1 — Bayesian optimisation (fresh data)
        run: python -u model/pipeline.py --mode optimize --force-data 2>&1 | tee -a run_console.log
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Step 2 — Full train + predict
        run: python -u model/pipeline.py --mode full 2>&1 | tee -a run_console.log
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      # Commit train/predict output BEFORE the long backtest, so a backtest
      # failure or timeout cannot lose the trained predictions.
      - name: Commit predictions (checkpoint)
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add docs/assets/
          git add data/predictions/predictions_latest.json data/predictions/performance.json || true
          git add model/saved/optimal_weights.json model/saved/version.txt || true
          git diff --staged --quiet || git commit -m "Baseline train/predict — $(date -u '+%Y-%m-%d %H:%M')"
          git push

      - name: Step 3 — Honest backtest
        run: python -u model/pipeline.py --mode backtest 2>&1 | tee -a run_console.log
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Commit backtest results
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add docs/assets/
          git add data/predictions/backtest_results.json || true
          git diff --staged --quiet || git commit -m "Honest baseline backtest — $(date -u '+%Y-%m-%d %H:%M')"
          git push

      # Commit the console log so the outcome is publicly inspectable
      # (anonymous users cannot read Actions logs).
      - name: Publish run log
        if: always()
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          {
            echo "=== baseline run $(date -u '+%Y-%m-%dT%H:%MZ') — status: ${{ job.status }} ==="
            python -V
            pip list 2>/dev/null | grep -iE "torch|xgboost|lightgbm|optuna|pandas|scikit" || true
            echo "--- console (tail) ---"
            tail -c 40000 run_console.log 2>/dev/null || echo "(no console log)"
            echo "--- data/pipeline.log (tail) ---"
            tail -c 20000 data/pipeline.log 2>/dev/null || echo "(no pipeline.log)"
          } > data/last_run_log.txt
          git pull --rebase origin main || true
          git add data/last_run_log.txt
          git commit -m "Baseline run log — $(date -u '+%Y-%m-%d %H:%M')" || true
          git push || true

      - name: Upload pipeline log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-log-${{ github.run_number }}
          path: data/pipeline.log
          retention-days: 14
