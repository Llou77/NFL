name: Per-Season Model Analysis

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p data/raw data/processed data/predictions/archive model/saved docs/assets

      - name: Run per-season analysis
        run: python model/pipeline.py --mode analyze_seasons
        env:
          PYTHONPATH: ${{ github.workspace }}/model

      - name: Commit results
        run: |
          git config user.name  "NFL Predictor Bot"
          git config user.email "nfl-bot@users.noreply.github.com"
          git add data/predictions/season_analysis.json || true
          git add docs/assets/season_analysis.json || true
          git diff --staged --quiet || git commit -m "Season analysis update — $(date -u '+%Y-%m-%d')"
          git push
